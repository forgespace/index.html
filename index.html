<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Forge - Тест с исследованиями</title>
    <style>
        body { background:#050810; color:#e8e8e8; font-family:monospace; padding:20px; }
        .big { font-size:20px; color:#4fc3f7; }
        button { padding:8px 14px; margin:3px; font-size:14px; cursor:pointer; }
        .order { border:1px solid #2a3a5c; padding:8px; margin:5px 0; }
        .upgrade { border:1px solid #2a3a5c; padding:5px; margin:3px 0; cursor:pointer; }
        .tab { display:inline-block; padding:5px 10px; border:1px solid #2a3a5c; cursor:pointer; }
        .tab.active { border-color:#4fc3f7; color:#4fc3f7; }
    </style>
</head>
<body>
    <h1>🚀 Drone Forge</h1>
    <p>День: <span id="d" class="big">1</span> | Осталось: <span id="r" class="big">10</span>с | ⭐<span id="p">0</span> | ОП: <span id="op">0</span></p>
    <p>ГК: <span id="c">100</span> | Дронов: <span id="t">0</span> | Склад: <span id="w">0</span>/<span id="wm">20</span> | Очки: <span id="lp">0</span></p>
    <p>Интервал: <span id="int">2.0</span>с</p>
    <button onclick="produce()">🔨 Произвести дрона</button>
    <button onclick="prestige()" style="background:#ff5252;color:#fff;">🔄 ПРЕСТИЖ (1000 дронов)</button>
    
    <div style="margin-top:10px;">
        <span class="tab active" onclick="showTab('upgrades')">Апгрейды</span>
        <span class="tab" onclick="showTab('lab')">Лаборатория</span>
        <span class="tab" onclick="showTab('orders')">Заказы</span>
    </div>
    
    <div id="tab-upgrades">
        <h3>Апгрейды:</h3>
        <div id="upgrades"></div>
    </div>
    <div id="tab-lab" style="display:none;">
        <h3>Исследования:</h3>
        <div id="tree"></div>
    </div>
    <div id="tab-orders" style="display:none;">
        <h3>Заказы:</h3>
        <div id="orders">Нет заказов</div>
    </div>

    <script>
        let day = 1, credits = 100, totalMade = 0, prestigeLevel = 0, prestigePoints = 0;
        let dayDuration = 10, dayStart = Date.now();
        let canProduce = true, storage = 0, warehouse = 20, produceInterval = 2.0;
        let activeOrders = [], orderId = 1;
        let upgradeLevel = 0;
        let labPoints = 0, ordersSinceLab = 0;
        let treeResearched = { c2: false };

        function produce() {
            if (!canProduce) return;
            if (storage >= warehouse) { alert('Склад полон!'); return; }
            storage++; totalMade++;
            document.getElementById('t').innerText = totalMade;
            document.getElementById('w').innerText = storage + '/' + warehouse;
            canProduce = false;
            setTimeout(() => { canProduce = true; }, produceInterval * 1000);
        }

        function buyUpgrade() {
            let maxLvl = treeResearched.c2 ? 2 : 1;
            if (upgradeLevel >= maxLvl) { alert('Макс. уровень! Исследуйте в Лаборатории.'); return; }
            let cost = 50 * (upgradeLevel + 1);
            if (credits < cost) { alert('Недостаточно ГК!'); return; }
            credits -= cost;
            upgradeLevel++;
            produceInterval *= 0.8;
            updateUI();
            renderUpgrades();
        }

        function researchNode(id) {
            if (id === 'c2' && treeResearched.c2) { alert('Уже изучено!'); return; }
            if (labPoints < 5) { alert('Нужно 5 очков!'); return; }
            labPoints -= 5;
            treeResearched.c2 = true;
            renderTree();
            renderUpgrades();
            updateUI();
            alert('Конвейер 2 изучен!');
        }

        function renderUpgrades() {
            let maxLvl = treeResearched.c2 ? 2 : 1;
            let cost = 50 * (upgradeLevel + 1);
            document.getElementById('upgrades').innerHTML = 
                `<div class="upgrade" onclick="buyUpgrade()">⚙️ Конвейер (${upgradeLevel}/${maxLvl}) | -20% | ${upgradeLevel >= maxLvl ? 'MAX' : cost + ' ГК'}</div>`;
        }

        function renderTree() {
            let h = '<div class="upgrade" onclick="researchNode(\'c2\')">';
            h += treeResearched.c2 ? '✅ Конвейер 2 (изучено)' : '🔬 Конвейер 2 (5 очков)';
            h += '</div>';
            document.getElementById('tree').innerHTML = h;
        }

        function addOrder() {
            if (activeOrders.length >= 3) return;
            let o = { id: orderId++, text: 'Заказ: 3 дрона за 30 ГК', amount: 3, reward: 30, time: 8, start: Date.now() };
            activeOrders.push(o);
            renderOrders();
        }

        function completeOrder(id) {
            let o = activeOrders.find(x => x.id === id);
            if (!o) return;
            if (storage < o.amount) { alert('Не хватает дронов!'); return; }
            storage -= o.amount;
            credits += o.reward;
            ordersSinceLab++;
            if (ordersSinceLab >= 2) { ordersSinceLab -= 2; labPoints++; }
            activeOrders = activeOrders.filter(x => x.id !== id);
            updateUI();
            renderOrders();
        }

        function renderOrders() {
            let h = '';
            for (let o of activeOrders) {
                let elapsed = (Date.now() - o.start) / 1000;
                let remaining = Math.max(0, o.time - elapsed);
                if (remaining <= 0) { activeOrders = activeOrders.filter(x => x.id !== o.id); continue; }
                h += `<div class="order">${o.text} | ⏰${Math.ceil(remaining)}с <button onclick="completeOrder(${o.id})">✓</button></div>`;
            }
            document.getElementById('orders').innerHTML = h || 'Нет заказов';
        }

        function prestige() {
            if (totalMade < 1000) { alert('Нужно 1000 дронов!'); return; }
            prestigeLevel++; prestigePoints++;
            credits = 500; totalMade = 0; storage = 0; warehouse = 20;
            produceInterval = 2.0; upgradeLevel = 0; labPoints = 0;
            activeOrders = []; day = 1; dayStart = Date.now();
            treeResearched.c2 = Math.random() < 0.2;
            updateUI(); renderUpgrades(); renderTree(); renderOrders();
            alert('ПРЕСТИЖ ' + prestigeLevel + '!');
        }

        function updateUI() {
            document.getElementById('c').innerText = credits;
            document.getElementById('t').innerText = totalMade;
            document.getElementById('w').innerText = storage + '/' + warehouse;
            document.getElementById('wm').innerText = warehouse;
            document.getElementById('int').innerText = produceInterval.toFixed(1);
            document.getElementById('p').innerText = prestigeLevel;
            document.getElementById('op').innerText = prestigePoints;
            document.getElementById('lp').innerText = labPoints;
        }

        function showTab(tab) {
            document.getElementById('tab-upgrades').style.display = 'none';
            document.getElementById('tab-lab').style.display = 'none';
            document.getElementById('tab-orders').style.display = 'none';
            document.getElementById('tab-' + tab).style.display = 'block';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'upgrades') document.querySelectorAll('.tab')[0].classList.add('active');
            if (tab === 'lab') document.querySelectorAll('.tab')[1].classList.add('active');
            if (tab === 'orders') document.querySelectorAll('.tab')[2].classList.add('active');
        }

        function loop() {
            let elapsed = (Date.now() - dayStart) / 1000;
            let remaining = Math.max(0, Math.ceil(dayDuration - elapsed));
            document.getElementById('r').innerText = remaining;

            if (elapsed >= dayDuration) {
                day++;
                dayStart = Date.now();
                document.getElementById('d').innerText = day;
                addOrder();
            }

            renderOrders();
            updateUI();
            requestAnimationFrame(() => setTimeout(loop, 200));
        }

        addOrder();
        setInterval(addOrder, 5000);
        renderUpgrades();
        renderTree();
        loop();
    </script>
</body>
</html>
