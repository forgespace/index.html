<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Drone Forge</title>
    <style>
        :root {
            --bg: #0a0e17; --panel: #0d1520; --border: #2a3a5c;
            --accent: #4fc3f7; --gold: #ffd54f; --green: #66bb6a;
            --red: #ff5252; --orange: #ff9800; --purple: #ce93d8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050810; color: #e8e8e8; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 0; }
        #game { width: 100%; max-width: 440px; background: #111827; border: 1px solid #2a3a5c; position: relative; user-select: none; display: flex; flex-direction: column; height: 100vh; max-height: 100vh; }
        .header { text-align: center; border-bottom: 2px solid #2a3a5c; padding: 8px; flex-shrink: 0; background: #0d1520; }
        .header h1 { color: var(--accent); font-size: 15px; letter-spacing: 2px; margin: 0; }
        .header .location { color: #90a4ae; font-size: 10px; margin-top: 2px; }
        .top-resources { background: var(--panel); border-bottom: 1px solid var(--border); padding: 6px 10px; display: flex; justify-content: space-between; flex-shrink: 0; font-size: 9px; flex-wrap: wrap; gap: 3px; }
        .res-item { color: var(--gold); font-weight: bold; } .res-lbl { color: #78909c; font-size: 7px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .drone-area { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 10px; text-align: center; }
        .drone-icon { font-size: 44px; transition: transform 0.2s; cursor: pointer; }
        .drone-icon.pulse { transform: scale(1.3); }
        .drone-name { color: var(--accent); font-weight: bold; font-size: 13px; margin-top: 4px; }
        .btn-produce { width: 100%; padding: 12px; background: var(--orange); border: none; border-radius: 8px; color: #000; font-size: 14px; font-weight: bold; cursor: pointer; margin: 6px 0; font-family: 'Courier New', monospace; }
        .btn-produce.cooldown { background: #444; color: #888; cursor: not-allowed; }
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin: 4px 0; }
        .progress-fill { height: 100%; background: var(--orange); width: 0%; border-radius: 2px; }
        .section-title { color: var(--accent); font-size: 13px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 3px; margin: 10px 0 6px; }
        .order-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 7px; margin-bottom: 4px; font-size: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-tiny { padding: 3px 7px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; font-size: 9px; }
        .btn-accept { background: var(--accent); color: #000; } .btn-decline { background: var(--red); color: #fff; }
        .event-area { background: #1a0a0a; border: 1px solid var(--red); border-radius: 6px; padding: 8px; margin: 6px 0; display: none; }
        .event-area h3 { color: var(--red); font-size: 12px; margin-bottom: 4px; }
        .event-area button { margin: 2px; padding: 5px 10px; background: var(--red); border: none; color: #fff; cursor: pointer; font-family: 'Courier New', monospace; font-size: 9px; border-radius: 4px; }
        .upgrade { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 7px; margin-bottom: 3px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
        .upgrade .name { color: var(--accent); font-weight: bold; } .upgrade .cost { color: var(--gold); }
        .tree-node { padding: 7px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 9px; text-align: center; margin: 3px 0; }
        .tree-node.researched { border-color: var(--green); background: #0a1a0a; }
        .tree-node.available { border-color: var(--purple); background: #1a0a2e; }
        .minigame-area { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 8px 0; text-align: center; }
        .minigame-target { display: inline-block; width: 44px; height: 44px; background: var(--orange); border-radius: 50%; cursor: pointer; margin: 4px; }
        .bank-panel { background: #0a1a0a; border: 1px solid #ffd700; border-radius: 6px; padding: 8px; margin: 6px 0; font-size: 10px; display: flex; justify-content: space-between; align-items: center; }
        .bottom-nav { display: flex; gap: 2px; padding: 6px 10px; border-top: 1px solid #2a3a5c; flex-shrink: 0; background: #0d1520; }
        .nav-btn { flex: 1; padding: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: #90a4ae; text-align: center; cursor: pointer; font-size: 10px; font-family: 'Courier New', monospace; font-weight: bold; }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); background: #0f1a2e; }
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>
<div id="game">
    <div class="header"><h1>🚀 DRONE FORGE</h1><div class="location">ГАРАЖ | День <span id="day">1</span> | ⭐<span id="prestige">0</span> | ОП: <span id="op">0</span> | ⏳<span id="timer">60</span>с</div></div>
    <div class="top-resources">
        <div><span class="res-lbl">💎</span> <span class="res-item" id="credits">100</span></div>
        <div><span class="res-lbl">🤖</span> <span class="res-item" id="drones">0</span></div>
        <div><span class="res-lbl">📦</span> <span class="res-item"><span id="whUsed">0</span>/<span id="whMax">20</span></span></div>
        <div><span class="res-lbl">🔬</span> <span class="res-item" id="lab">0</span></div>
        <div><span class="res-lbl">🔩</span> <span class="res-item" id="parts">0</span></div>
        <div><span class="res-lbl">🧪</span> <span class="res-item" id="catalysts">0</span></div>
        <div><span class="res-lbl">🔮</span> <span class="res-item" id="dark">0</span></div>
    </div>

    <div class="scroll-area" id="scrollArea">
        <div class="tab-content active" id="tab-game">
            <div class="drone-area"><div class="drone-icon" id="droneIcon">🐜</div><div class="drone-name" id="droneName">Муравей МК-1 (+5%)</div></div>
            <button class="btn-produce" id="produceBtn" onclick="produce()">🔨 ПРОИЗВЕСТИ ДРОНА</button>
            <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
            <div style="text-align:center;font-size:9px;margin-bottom:6px;">Перезарядка: <span id="intervalText">2.0</span>с</div>
            <div class="bank-panel" id="bankPanel"><div>🏦 Вклад: <b id="bankDep">0</b> ГК | +<b id="bankInc">0</b>/д</div><div><button onclick="deposit(100)" style="padding:3px 7px;background:#ffd700;color:#000;border:none;border-radius:3px;cursor:pointer;font-family:'Courier New';font-size:8px;">+100</button> <button onclick="withdraw()" style="padding:3px 7px;background:#ff5252;color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'Courier New';font-size:8px;">Снять</button></div></div>
            <div class="event-area" id="eventBox"><h3 id="eventTitle"></h3><p id="eventText" style="font-size:10px;"></p><div id="eventBtns"></div></div>
            <div class="section-title">📦 ЗАКАЗЫ</div><div id="orders">Нет заказов</div>
            <div class="minigame-area"><h3>🎯 Мини-игра (30с)</h3><div style="font-size:9px;">Очки: <span id="mgScore">0</span> | +<span id="mgReward">0</span> ГК | ⏱<span id="mgTimer">30</span>с</div><div id="mgTarget"><div class="minigame-target" onclick="hitTarget()"></div></div></div>
        </div>
        <div class="tab-content" id="tab-upgrades">
            <div class="section-title">🔧 АПГРЕЙДЫ</div><div id="upgradesList"></div>
            <div class="section-title" style="margin-top:10px;">⭐ ПЕРМАНЕНТНЫЕ</div><div id="permUpgrades"></div>
            <button onclick="prestige()" style="width:100%;padding:10px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'Courier New';font-size:12px;cursor:pointer;margin-top:8px;">🔄 ПРЕСТИЖ (100 дронов)</button>
        </div>
        <div class="tab-content" id="tab-lab">
            <div class="section-title">🔬 ЛАБОРАТОРИЯ</div><div id="tree"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="showTab('game')">🏭 ЦЕХ</div>
        <div class="nav-btn" onclick="showTab('upgrades')">🔧</div>
        <div class="nav-btn" onclick="showTab('lab')">🔬</div>
    </div>
</div>

<script>
// === СОСТОЯНИЕ ===
let day = 1, prestigeLevel = 0, prestigePoints = 0;
let credits = 100, storage = 0, warehouse = 20, totalMade = 0, totalEarned = 0, ordersCompleted = 0;
let produceInterval = 2.0, canProduce = true;
let dayDuration = 60, dayStart = Date.now();
let labPoints = 0, ordersSinceLab = 0, parts = 0, catalysts = 0, darkMatter = 0, bankDeposit = 0;
let activeOrders = [], orderId = 1;
let upgradeLevels = { conveyor: 0, robot: 0 };
let permUpgrades = { base_prod: 0, start_credits: 0, rep_bonus: 0 };
let treeResearched = { c2: false, c3: false, r2: false, r3: false, shop2: false };
let investorActive = false, investorDays = 0;
let mgActive = false, mgScore = 0, mgReward = 0, mgInterval = null, mgStart = 0;
let wheelUsed = false, wheelLast = localStorage.getItem('df_wheel')||'0';

function produce() {
    if (!canProduce) return;
    if (storage >= warehouse) { alert('Склад полон!'); return; }
    storage++; totalMade++;
    updateUI();
    canProduce = false;
    document.getElementById('produceBtn').classList.add('cooldown');
    document.getElementById('produceBtn').innerText = '⏳...';
    let interval = produceInterval, start = Date.now();
    let timer = setInterval(() => {
        let rem = Math.max(0, interval - (Date.now() - start) / 1000);
        document.getElementById('progFill').style.width = ((interval - rem) / interval * 100) + '%';
        document.getElementById('intervalText').innerText = rem.toFixed(1);
        if (rem <= 0) { clearInterval(timer); canProduce = true; document.getElementById('produceBtn').classList.remove('cooldown'); document.getElementById('produceBtn').innerText = '🔨 ПРОИЗВЕСТИ'; document.getElementById('progFill').style.width = '0%'; document.getElementById('intervalText').innerText = interval.toFixed(1); }
    }, 50);
}

function addOrder() { if (activeOrders.length >= 3) return; let o = { id: orderId++, text: 'Заказ: 3 дрона за 30 ГК', amount: 3, reward: 30, time: 15, start: Date.now() }; activeOrders.push(o); renderOrders(); }
function completeOrder(id) { let o = activeOrders.find(x => x.id === id); if (!o || storage < o.amount) { alert('Не хватает!'); return; } storage -= o.amount; let r = o.reward; if (investorActive) r = Math.floor(r * 0.8); credits += r; totalEarned += r; ordersCompleted++; ordersSinceLab++; if (ordersSinceLab >= 2) { ordersSinceLab -= 2; labPoints++; } if (Math.random() < 0.05) parts++; activeOrders = activeOrders.filter(x => x.id !== id); updateUI(); renderOrders(); }
function renderOrders() { let h = ''; for (let o of activeOrders) { let rem = Math.max(0, o.time - (Date.now() - o.start) / 1000); if (rem <= 0) { activeOrders = activeOrders.filter(x => x.id !== o.id); continue; } h += `<div class="order-card"><span>${o.text} | ⏰${Math.ceil(rem)}с</span><button class="btn-tiny btn-accept" onclick="completeOrder(${o.id})">✓</button></div>`; } document.getElementById('orders').innerHTML = h || 'Нет заказов'; }

function buyUpgrade(type) {
    let lvl = upgradeLevels[type], maxLvl = 1;
    if (type === 'conveyor') { if (treeResearched.c3) maxLvl = 3; else if (treeResearched.c2) maxLvl = 2; }
    if (type === 'robot') { if (treeResearched.r3) maxLvl = 3; else if (treeResearched.r2) maxLvl = 2; }
    if (lvl >= maxLvl) { alert('Максимум! Исследуйте в Лаборатории.'); return; }
    let cost = 50 * (lvl + 1); if (credits < cost) { alert('Недостаточно ГК!'); return; }
    credits -= cost; upgradeLevels[type]++; if (type === 'conveyor') produceInterval *= 0.85;
    updateUI(); renderUpgrades();
}
function buyPermUpgrade(type) { if (permUpgrades[type] >= 5) { alert('Максимум!'); return; } if (prestigePoints < 2) { alert('Нужно 2 ОП!'); return; } prestigePoints -= 2; permUpgrades[type]++; if (type === 'base_prod') produceInterval *= 0.9; if (type === 'start_credits') credits += 200; updateUI(); renderUpgrades(); }
function renderUpgrades() {
    let cl = upgradeLevels.conveyor, cm = treeResearched.c3 ? 3 : treeResearched.c2 ? 2 : 1;
    let rl = upgradeLevels.robot, rm = treeResearched.r3 ? 3 : treeResearched.r2 ? 2 : 1;
    let h = `<div class="upgrade" onclick="buyUpgrade('conveyor')"><span class="name">⚙️ Конвейер (${cl}/${cm})</span><span class="cost">${cl>=cm?'MAX':(50*(cl+1))+' ГК'}</span></div>`;
    h += `<div class="upgrade" onclick="buyUpgrade('robot')"><span class="name">🤖 Робот (${rl}/${rm})</span><span class="cost">${rl>=rm?'MAX':(50*(rl+1))+' ГК'}</span></div>`;
    document.getElementById('upgradesList').innerHTML = h;
    h = ''; let names = { base_prod: 'Чертежи', start_credits: 'Капитал', rep_bonus: 'Дип. корпус' };
    for (let k in permUpgrades) h += `<div class="upgrade" onclick="buyPermUpgrade('${k}')"><span class="name">⭐ ${names[k]} (${permUpgrades[k]}/5)</span><span class="cost">${permUpgrades[k]>=5?'MAX':'2 ОП'}</span></div>`;
    document.getElementById('permUpgrades').innerHTML = h;
}

function research(id) { let costs = { c2: 5, c3: 7, r2: 6, r3: 8, shop2: 8 }, reqs = { c3: 'c2', r3: 'r2' }; if (treeResearched[id]) { alert('Уже изучено!'); return; } if (reqs[id] && !treeResearched[reqs[id]]) { alert('Сначала изучите предыдущий!'); return; } if (labPoints < costs[id]) { alert('Нужно ' + costs[id] + ' очков!'); return; } labPoints -= costs[id]; treeResearched[id] = true; if (id === 'shop2') warehouse += 5; renderTree(); renderUpgrades(); updateUI(); }
function renderTree() { let h = '', nodes = [{ id: 'c2', name: '⚙️ Конвейер 2', cost: 5 }, { id: 'c3', name: '⚙️ Конвейер 3', cost: 7, req: 'c2' }, { id: 'r2', name: '🤖 Роботизация 2', cost: 6 }, { id: 'r3', name: '🤖 Роботизация 3', cost: 8, req: 'r2' }, { id: 'shop2', name: '🏭 Цех 2', cost: 8 }]; for (let n of nodes) { let cls = treeResearched[n.id] ? 'tree-node researched' : 'tree-node available'; if (n.req && !treeResearched[n.req]) cls = 'tree-node'; h += `<div class="${cls}" onclick="research('${n.id}')">${n.name} (${n.cost} очк) ${treeResearched[n.id]?'✅':''}</div>`; } document.getElementById('tree').innerHTML = h || 'Все открыты!'; }

function prestige() { if (totalMade < 100) { alert('Нужно 100 дронов!'); return; } prestigeLevel++; prestigePoints++; credits = 500 + permUpgrades.start_credits * 200; storage = 0; totalMade = 0; warehouse = 20; produceInterval = 2.0 * Math.pow(0.9, permUpgrades.base_prod); upgradeLevels = { conveyor: 0, robot: 0 }; labPoints = 0; ordersSinceLab = 0; activeOrders = []; day = 1; dayStart = Date.now(); let keep = []; for (let k in treeResearched) { if (treeResearched[k] && Math.random() < 0.2) keep.push(k); } for (let k in treeResearched) treeResearched[k] = false; for (let k of keep) treeResearched[k] = true; parts = Math.ceil(parts * 0.2); catalysts = Math.ceil(catalysts * 0.2); darkMatter = Math.ceil(darkMatter * 0.2); investorActive = false; updateUI(); renderUpgrades(); renderTree(); renderOrders(); alert('🔄 ПРЕСТИЖ ' + prestigeLevel + '!'); }

// === МИНИ-ИГРА ===
function startMG() { if (mgActive) return; mgActive = true; mgScore = 0; mgReward = 0; mgStart = Date.now(); document.getElementById('mgScore').innerText = '0'; document.getElementById('mgReward').innerText = '0'; document.getElementById('mgTarget').innerHTML = '<div class="minigame-target" onclick="hitTarget()"></div>'; mgInterval = setInterval(() => { let rem = Math.max(0, 30 - (Date.now() - mgStart) / 1000); document.getElementById('mgTimer').innerText = Math.ceil(rem); if (rem <= 0) endMG(); }, 300); }
function hitTarget() { if (!mgActive) return; mgScore++; mgReward++; document.getElementById('mgScore').innerText = mgScore; document.getElementById('mgReward').innerText = mgReward; }
function endMG() { mgActive = false; clearInterval(mgInterval); credits += mgReward; totalEarned += mgReward; document.getElementById('mgTarget').innerHTML = '<div style="color:#78909c;">+' + mgReward + ' ГК</div>'; setTimeout(() => { document.getElementById('mgTarget').innerHTML = '<div class="minigame-target" onclick="hitTarget()"></div>'; document.getElementById('mgScore').innerText = '0'; document.getElementById('mgReward').innerText = '0'; document.getElementById('mgTimer').innerText = '30'; }, 2000); updateUI(); }

// === БАНК ===
function deposit(amt) { if (credits < amt) { alert('Недостаточно!'); return; } credits -= amt; bankDeposit += amt; updateUI(); }
function withdraw() { credits += bankDeposit; bankDeposit = 0; updateUI(); }

// === КОЛЕСО ===
function spinWheel() { let n = Date.now(), l = parseInt(wheelLast); if (n - l < 86400000) { alert('Раз в 24 часа!'); return; } wheelLast = n; localStorage.setItem('df_wheel', n); let p = [{ t: '💰 50 ГК', a: () => { credits += 50; } }, { t: '🔬 +3 очка', a: () => { labPoints += 3; } }, { t: '🔩 +1 деталь', a: () => { parts++; } }]; let r = p[Math.floor(Math.random() * p.length)]; r.a(); alert('🎰 ' + r.t); updateUI(); }

// === СОБЫТИЯ ===
function triggerEvent() {
    let evts = [
        { title: '⚠ Пожар!', text: 'Потушить за 30 ГК или потерять дронов?', btn1: 'Тушить (30)', act1: () => { if (credits >= 30) credits -= 30; else storage = Math.floor(storage / 2); }, btn2: 'Риск', act2: () => { storage = Math.floor(storage / 2); } },
        { title: '💰 Торговец', text: '+50% к цене на 60 сек за 40 ГК', btn1: 'Купить', act1: () => { if (credits >= 40) { credits -= 40; alert('Буст!'); } }, btn2: 'Нет', act2: () => {} },
        { title: '💼 Инвестор', text: '500 ГК, -20% дохода на 3 дня', btn1: 'Да', act1: () => { if (!investorActive) { credits += 500; investorActive = true; investorDays = 3; } }, btn2: 'Нет', act2: () => {} },
        { title: '🛸 НЛО', text: 'Сбить?', btn1: 'Сбить', act1: () => { if (Math.random() < 0.6) { credits += 40; if (Math.random() < 0.2) darkMatter++; } else { storage = Math.max(0, storage - 2); } }, btn2: 'Пропустить', act2: () => { credits += Math.floor(Math.random() * 30); } },
    ];
    let ev = evts[Math.floor(Math.random() * evts.length)];
    document.getElementById('eventBox').style.display = 'block';
    document.getElementById('eventTitle').innerText = ev.title;
    document.getElementById('eventText').innerText = ev.text;
    document.getElementById('eventBtns').innerHTML = `<button onclick="document.getElementById('eventBox').style.display='none';(function(){ ${ev.act1.toString().replace(/^\(\)\s*=>\s*\{/, '').replace(/\}$/, '')} })();updateUI();">${ev.btn1}</button><button onclick="document.getElementById('eventBox').style.display='none';(function(){ ${ev.act2.toString().replace(/^\(\)\s*=>\s*\{/, '').replace(/\}$/, '')} })();updateUI();">${ev.btn2}</button>`;
}

function updateUI() {
    document.getElementById('day').innerText = day; document.getElementById('prestige').innerText = prestigeLevel;
    document.getElementById('op').innerText = prestigePoints; document.getElementById('credits').innerText = credits;
    document.getElementById('drones').innerText = totalMade; document.getElementById('whUsed').innerText = storage;
    document.getElementById('whMax').innerText = warehouse; document.getElementById('lab').innerText = labPoints;
    document.getElementById('intervalText').innerText = produceInterval.toFixed(1);
    document.getElementById('parts').innerText = parts; document.getElementById('catalysts').innerText = catalysts;
    document.getElementById('dark').innerText = darkMatter;
    document.getElementById('bankDep').innerText = bankDeposit; document.getElementById('bankInc').innerText = Math.floor(bankDeposit * 0.05);
}
function showTab(tab) { document.getElementById('tab-game').style.display = 'none'; document.getElementById('tab-upgrades').style.display = 'none'; document.getElementById('tab-lab').style.display = 'none'; document.getElementById('tab-' + tab).style.display = 'block'; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); let idx = { game: 0, upgrades: 1, lab: 2 }; document.querySelectorAll('.nav-btn')[idx[tab]].classList.add('active'); if (tab === 'upgrades') renderUpgrades(); if (tab === 'lab') renderTree(); }

function newDay() { day++; dayStart = Date.now(); addOrder(); if (investorActive) { investorDays--; if (investorDays <= 0) investorActive = false; } credits += Math.floor(bankDeposit * 0.05); updateUI(); }

function gameLoop() {
    let elapsed = (Date.now() - dayStart) / 1000;
    let remaining = Math.max(0, Math.ceil(dayDuration - elapsed));
    document.getElementById('timer').innerText = remaining;
    if (elapsed >= dayDuration) newDay();
    renderOrders(); updateUI();
    requestAnimationFrame(() => setTimeout(gameLoop, 200));
}

document.getElementById('droneIcon').addEventListener('click', () => { if (!mgActive) startMG(); });
addOrder(); setInterval(addOrder, 8000); setInterval(() => { if (Math.random() < 0.3) triggerEvent(); }, 15000);
renderUpgrades(); renderTree(); gameLoop();
</script>
</body>
</html>
